name: clasp push (RA_Emails)

on:
  push:
    branches: [main]
    paths:
      - "apps-script-consolidated/**"
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm i -g @google/clasp

      - name: Write clasp token
        env:
          CLASPRC_JSON_B64: ${{ secrets.CLASPRC_JSON_B64 }}
        run: |
          printf '%s' "$CLASPRC_JSON_B64" | base64 -d > ~/.clasprc.json

      - name: Push Apps Script
        working-directory: apps-script-consolidated
        run: |
          clasp status
          clasp push

